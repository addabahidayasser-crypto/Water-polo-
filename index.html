<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Polo Blur Effect</title>
<style>
/* ========================= */
/* Enhanced Water Polo Background */
/* ========================= */

body {
  margin: 0;
  padding: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', sans-serif;
  background: #0a1f44; /* deep pool blue */
  position: relative;
}

/* Water blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.6;
  mix-blend-mode: screen; /* mixes colors naturally */
  animation: float infinite alternate;
}

/* Blob variations */
.blob1 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle at 30% 30%, #00cfff, #004b7f);
  top: -150px;
  left: -150px;
  animation-duration: 12s;
}

.blob2 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle at 70% 70%, #ffd500, #ff7f00);
  top: 250px;
  left: 100px;
  animation-duration: 15s;
}

.blob3 {
  width: 350px;
  height: 350px;
  background: radial-gradient(circle at 50% 50%, #00ffa3, #00664d);
  top: 400px;
  left: -50px;
  animation-duration: 10s;
}

.blob4 {
  width: 450px;
  height: 450px;
  background: radial-gradient(circle at 40% 60%, #0077ff, #00ffff);
  top: 100px;
  left: 300px;
  animation-duration: 18s;
}

.blob5 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle at 50% 50%, #ffec7f, #ffaa00);
  top: 500px;
  left: 400px;
  animation-duration: 14s;
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0) translateX(0) rotate(0deg); }
  25% { transform: translateY(-40px) translateX(30px) rotate(15deg); }
  50% { transform: translateY(-20px) translateX(-30px) rotate(-10deg); }
  75% { transform: translateY(30px) translateX(20px) rotate(5deg); }
  100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
}

/* Optional: Text on top */
h1 {
  position: relative;
  z-index: 10;
  color: white;
  font-size: 4rem;
  text-align: center;
  text-shadow: 2px 2px 20px rgba(0,0,0,0.5);
}

/* Subtle water wave overlay */
.wave {
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-radial-gradient(circle at center, rgba(255,255,255,0.02) 0 10px, transparent 10px 20px);
  animation: waveMove 20s linear infinite;
  top: -50%;
  left: -50%;
  pointer-events: none;
}

@keyframes waveMove {
  0% { transform: translateX(0) translateY(0) rotate(0deg); }
  100% { transform: translateX(50px) translateY(30px) rotate(360deg); }
}
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="blob blob4"></div>
<div class="blob blob5"></div>

<div class="wave"></div>

<h1>Water Polo Vibes</h1>

</body>
  </html>
